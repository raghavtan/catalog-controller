apiVersion: catalog.onefootball.com/v1alpha1
kind: Metric
metadata:
  finalizers:
  - metacontroller.io/compositecontroller-metrics-controller
  labels:
    argocd.argoproj.io/instance: catalog-controller-prod-131-01
  name: adaptive-systems
spec:
  componentType:
  - service
  - cloud-resource
  cronSchedule: 0 * * * *
  description: https://github.com/motain/of-catalog/blob/main/docs/grading-system/resiliency.md#adaptive-systems
  evaluateOnDeploy: false
  facts:
  - auth: null
    filePath: app.toml
    id: app-toml-replicas-min
    jsonPath: .service.replicas_min // .service.production.replicas_min | . >= 3
    name: Minimum replicas always greater than 3 to ensure cross AZ availability
    repo: ${Metadata.Name}
    rule: jsonpath
    source: github
    type: extract
  - auth: null
    filePath: app.toml
    id: app-toml-replicas-max-gt-replicas-min
    jsonPath: (.service.replicas_min // .service.production.replicas_min) < (.service.replicas_max
      // .service.production.replicas_max)
    name: Minimum replicas always less than maximum replicas
    repo: ${Metadata.Name}
    rule: jsonpath
    source: github
    type: extract
  - dependsOn:
    - app-toml-replicas-min
    - app-toml-replicas-max-gt-replicas-min
    id: cpu-and-memory-hpa-are-set
    method: and
    name: Validate that CPU and Memory Horizontal Pod Autoscalers are set
    type: aggregate
  format:
    unit: Adaptive Systems
  grading-system: resiliency
  name: adaptive-systems