apiVersion: batch/v1
kind: CronJob
metadata:
  annotations:
    metric.catalog.onefootball.com/grading-system: resiliency
    metric.catalog.onefootball.com/name: adaptive-systems
    metric.catalog.onefootball.com/spec-hash: e0e1ff173a063b1f663df3e960052760
  labels:
    argocd.argoproj.io/instance: catalog-controller-prod-131-01
    metric.catalog.onefootball.com/grading-system: resiliency
    metric.catalog.onefootball.com/name: adaptive-systems
    metric.catalog.onefootball.com/spec-hash: e0e1ff173a063b1f663df3e960052760
  name: adaptive-systems-evaluator
  namespace: catalog-controller
spec:
  concurrencyPolicy: Forbid
  failedJobsHistoryLimit: 2
  jobTemplate:
    metadata:
      labels:
        argocd.argoproj.io/instance: catalog-controller-prod-131-01
        metric.catalog.onefootball.com/grading-system: resiliency
        metric.catalog.onefootball.com/name: adaptive-systems
        metric.catalog.onefootball.com/spec-hash: e0e1ff173a063b1f663df3e960052760
    spec:
      template:
        metadata:
          labels:
            argocd.argoproj.io/instance: catalog-controller-prod-131-01
            metric.catalog.onefootball.com/grading-system: resiliency
            metric.catalog.onefootball.com/name: adaptive-systems
            metric.catalog.onefootball.com/spec-hash: e0e1ff173a063b1f663df3e960052760
        spec:
          affinity:
            podAntiAffinity:
              preferredDuringSchedulingIgnoredDuringExecution:
                - podAffinityTerm:
                    labelSelector:
                      matchExpressions:
                        - key: app.kubernetes.io/name
                          operator: In
                          values:
                            - emissary-private
                    topologyKey: kubernetes.io/hostname
                  weight: 100
          containers:
            - command:
                - /bin/sh
                - -c
                - 'curl -X POST metric-evaluation-service/evaluate/adaptive-systems -H
              ''Content-Type: application/json'' -d ''{"spec": {"componentType": ["service",
              "cloud-resource"], "cronSchedule": "0 * * * *", "description": "https://github.com/motain/of-catalog/blob/main/docs/grading-system/resiliency.md#adaptive-systems",
              "evaluateOnDeploy": false, "facts": [{"auth": null, "filePath": "app.toml",
              "id": "app-toml-replicas-min", "jsonPath": ".service.replicas_min //
              .service.production.replicas_min | . >= 3", "name": "Minimum replicas
              always greater than 3 to ensure cross AZ availability", "repo": "${Metadata.Name}",
              "rule": "jsonpath", "source": "github", "type": "extract"}, {"auth":
              null, "filePath": "app.toml", "id": "app-toml-replicas-max-gt-replicas-min",
              "jsonPath": "(.service.replicas_min // .service.production.replicas_min)
              < (.service.replicas_max // .service.production.replicas_max)", "name":
              "Minimum replicas always less than maximum replicas", "repo": "${Metadata.Name}",
              "rule": "jsonpath", "source": "github", "type": "extract"}, {"dependsOn":
              ["app-toml-replicas-min", "app-toml-replicas-max-gt-replicas-min"],
              "id": "cpu-and-memory-hpa-are-set", "method": "and", "name": "Validate
              that CPU and Memory Horizontal Pod Autoscalers are set", "type": "aggregate"}],
              "format": {"unit": "Adaptive Systems"}, "grading-system": "resiliency",
              "name": "adaptive-systems"}}'''
              image: alpine/curl
              imagePullPolicy: Always
              name: compute-caller
              resources: { }
              terminationMessagePolicy: File
          nodeSelector:
            nodegroup.onefootball.com/class: platform
          restartPolicy: Never
          tolerations:
            - effect: NoSchedule
              key: nodegroup.onefootball.com/platform
              operator: Exists
  schedule: 0 * * * *
  successfulJobsHistoryLimit: 1
