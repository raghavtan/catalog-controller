apiVersion: batch/v1
kind: CronJob
metadata:
  annotations:
    metric.catalog.onefootball.com/grading-system: observability
    metric.catalog.onefootball.com/name: alert-routing-and-notifications
    metric.catalog.onefootball.com/spec-hash: acbf8a074045af522535d3c8a60192cc
  labels:
    argocd.argoproj.io/instance: catalog-controller-prod-131-01
    metric.catalog.onefootball.com/grading-system: observability
    metric.catalog.onefootball.com/name: alert-routing-and-notifications
    metric.catalog.onefootball.com/spec-hash: acbf8a074045af522535d3c8a60192cc
  name: alert-routing-and-notifications-evaluator
  namespace: catalog-controller
spec:
  concurrencyPolicy: Forbid
  failedJobsHistoryLimit: 2
  jobTemplate:
    metadata:
      labels:
        argocd.argoproj.io/instance: catalog-controller-prod-131-01
        metric.catalog.onefootball.com/grading-system: observability
        metric.catalog.onefootball.com/name: alert-routing-and-notifications
        metric.catalog.onefootball.com/spec-hash: acbf8a074045af522535d3c8a60192cc
    spec:
      template:
        metadata:
          labels:
            argocd.argoproj.io/instance: catalog-controller-prod-131-01
            metric.catalog.onefootball.com/grading-system: observability
            metric.catalog.onefootball.com/name: alert-routing-and-notifications
            metric.catalog.onefootball.com/spec-hash: acbf8a074045af522535d3c8a60192cc
        spec:
          affinity:
            podAntiAffinity:
              preferredDuringSchedulingIgnoredDuringExecution:
                - podAffinityTerm:
                    labelSelector:
                      matchExpressions:
                        - key: app.kubernetes.io/name
                          operator: In
                          values:
                            - emissary-private
                    topologyKey: kubernetes.io/hostname
                  weight: 100
          containers:
            - command:
                - /bin/sh
                - -c
                - 'curl -X POST metric-evaluation-service/evaluate/alert-routing-and-notifications
              -H ''Content-Type: application/json'' -d ''{"spec": {"componentType":
              ["service"], "cronSchedule": "0 * * * *", "description": "https://github.com/motain/of-catalog/blob/main/docs/grading-system/observability.md#alert-routing-and-notifications",
              "evaluateOnDeploy": false, "facts": [{"auth": {"header": "X-Honeycomb-Team",
              "tokenVar": "HONEYCOMB_API_KEY"}, "id": "fetch-slos", "jsonPath": ".[].id",
              "name": "Fetch SLOs", "rule": "jsonpath", "source": "jsonapi", "type":
              "extract", "uri": "https://api.eu1.honeycomb.io/1/slos/${Metadata.Name}"},
              {"auth": {"header": "X-Honeycomb-Team", "tokenVar": "HONEYCOMB_API_KEY"},
              "dependsOn": ["fetch-slos"], "id": "fetch-alerts-for-slos", "jsonPath":
              ".[].id", "name": "Fetch alerts for SLOs", "rule": "jsonpath", "source":
              "jsonapi", "type": "extract", "uri": "https://api.eu1.honeycomb.io/1/burn_alerts/${Metadata.Name}?slo_id=:slo_id"},
              {"auth": {"header": "X-Honeycomb-Team", "tokenVar": "HONEYCOMB_API_KEY"},
              "dependsOn": ["fetch-alerts-for-slos"], "id": "fetch-recipients-for-alerts",
              "jsonPath": ".recipients[].target", "name": "Fetch recipients for Alerts",
              "rule": "jsonpath", "source": "jsonapi", "type": "extract", "uri": "https://api.eu1.honeycomb.io/1/burn_alerts/${Metadata.Name}/:alert_id"},
              {"dependsOn": ["fetch-recipients-for-alerts"], "id": "validate-each-target-is-not-empty-string",
              "name": "Validate that each target is not an empty string", "pattern":
              "^\\S.*$", "rule": "regex_match", "type": "validate"}, {"dependsOn":
              ["validate-each-target-is-not-empty-string"], "id": "validate-all-targets-are-not-empty-strings",
              "method": "and", "name": "Validate that all targets are not empty strings",
              "type": "aggregate"}], "format": {"unit": "Critical Alerts/SLO Check"},
              "grading-system": "observability", "name": "alert-routing-and-notifications"}}'''
              image: alpine/curl
              imagePullPolicy: Always
              name: compute-caller
              resources: { }
              terminationMessagePolicy: File
          nodeSelector:
            nodegroup.onefootball.com/class: platform
          restartPolicy: Never
          tolerations:
            - effect: NoSchedule
              key: nodegroup.onefootball.com/platform
              operator: Exists
  schedule: 0 * * * *
  successfulJobsHistoryLimit: 1