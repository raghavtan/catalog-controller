[tool:pytest]
# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test execution options
addopts =
    -v
    --tb=short
    --strict-markers
    --strict-config
    --disable-warnings
    --cov=service
    --cov-report=term-missing
    --cov-fail-under=70
    --maxfail=10

# Test markers
markers =
    unit: Unit tests that test individual functions/methods
    integration: Integration tests that test component interactions
    e2e: End-to-end tests that test complete workflows
    slow: Slow running tests (>5 seconds)
    fast: Fast running tests (<1 second)
    smoke: Smoke tests for basic functionality
    regression: Regression tests for previously fixed bugs
    security: Security-related tests
    performance: Performance and load tests
    asyncio: Asynchronous tests that use asyncio

# Asyncio configuration
asyncio_mode = auto

# Test timeout (in seconds)
timeout = 300

# Minimum Python version
minversion = 3.8

# Ignore specific warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore:.*pkg_resources.*:DeprecationWarning

# Test discovery patterns
norecursedirs =
    .git
    .tox
    dist
    build
    *.egg
    venv
    __pycache__
    .pytest_cache

# Log configuration for tests
log_cli = false
log_cli_level = DEBUG
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Coverage configuration
[coverage:run]
source = service/
omit =
    */venv/*
    */tests/*
    */__pycache__/*
    */migrations/*
    */settings/*
    conftest.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:

[coverage:html]
directory = htmlcov