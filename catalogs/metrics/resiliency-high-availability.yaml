apiVersion: catalog.onefootball.com/v1alpha1
kind: Metric
metadata:
  name: high-availability
spec:
  description: https://github.com/motain/of-catalog/blob/main/docs/grading-system/resiliency.md#high-availability
  format:
    unit: High Availability
  name: high-availability
  facts:
    - auth: null
      filePath: app.toml
      id: app-toml-hpa-target-cpu
      jsonPath: .service.target_cpu_utilization_percentage // .service.production.target_cpu_utilization_percentage
        | . >= 20
      name: CPU utilization percentage is set to 20% or higher
      repo: ${Metadata.Name}
      rule: jsonpath
      source: github
      type: extract
    - auth: null
      filePath: app.toml
      id: app-toml-hpa-target-memory
      jsonPath: .service.target_memory_utilization_percentage // .service.production.target_memory_utilization_percentage
        | . >= 20
      name: Memory utilization percentage is set to 20% or higher
      repo: ${Metadata.Name}
      rule: jsonpath
      source: github
      type: extract
    - dependsOn:
        - app-toml-hpa-target-cpu
        - app-toml-hpa-target-memory
      id: cpu-and-memory-hpa-are-set
      method: or
      name: Validate that CPU and Memory Horizontal Pod Autoscalers are set
      type: aggregate
  componentType:
  - service
  - cloud-resource
  grading-system: resiliency
  cronSchedule: "0 * * * *"