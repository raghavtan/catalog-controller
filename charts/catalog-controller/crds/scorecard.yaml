apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: scorecards.catalog.onefootball.com
spec:
  group: catalog.onefootball.com
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - componentTypeIds
                - criteria
                - name
                - scoringStrategyType
              properties:
                componentTypeIds:
                  type: array
                  items:
                    type: string
                  description: List of component types this scorecard applies to.
                criteria:
                  type: array
                  items:
                    type: object
                    properties:
                      hasMetricValue:
                        type: object
                        required:
                          - comparator
                          - comparatorValue
                          - metricName
                          - name
                          - weight
                        properties:
                          comparator:
                            type: string
                            enum: ["EQUALS", "LESS_THAN", "GREATER_THAN", "NOT_EQUALS"]
                            description: The comparison operator.
                          comparatorValue:
                            x-kubernetes-int-or-string: true
                            description: The value to compare the metric against.
                          metricName:
                            type: string
                            description: The internal name/key of the metric.
                          name:
                            type: string
                            description: The display name of the criterion.
                          weight:
                            type: integer
                            format: int32
                            description: The weight of this criterion in the scoring.
                description:
                  type: string
                  description: A URL or text describing the scorecard.
                importance:
                  type: string
                  enum: ["REQUIRED", "RECOMMENDED", "OPTIONAL"]
                  description: The importance level of the scorecard.
                name:
                  type: string
                  description: The human-readable name of the scorecard.
                ownerId:
                  type: string
                  description: The identifier of the owner/team responsible for this scorecard.
                scoringStrategyType:
                  type: string
                  enum: ["WEIGHT_BASED", "POINT_BASED"]
                  description: The strategy used for calculating the score.
                state:
                  type: string
                  enum: ["DRAFT", "PUBLISHED", "ARCHIVED"]
                  description: The lifecycle state of the scorecard.
            status:
              type: object
              properties:
                id:
                  type: string
                  description: The unique identifier assigned to the scorecard (e.g., by an external system).
                criteria:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                  additionalProperties:
                    type: object
                    properties:
                      metricDefinitionId:
                        type: string
                        description: The unique identifier of the corresponding metric definition.
                    required:
                      - metricDefinitionId
                  description: Status for each criterion, keyed by the criterion's metric name.
                conditions:
                  type: array
                  items:
                    type: object
                    required:
                      - type
                      - status
                      - lastTransitionTime
                      - reason
                      - message
                    properties:
                      type:
                        type: string
                        description: Type of condition (e.g., Ready, Synced).
                      status:
                        type: string
                        enum: ["True", "False", "Unknown"]
                        description: Status of the condition.
                      lastTransitionTime:
                        type: string
                        format: date-time
                        description: Last time the condition transitioned from one status to another.
                      reason:
                        type: string
                        description: A unique, one-word, CamelCase reason for the condition's last transition.
                      message:
                        type: string
                        description: A human-readable message indicating details about the last transition.
                  description: Represents the latest available observations of the scorecard's state.
                lastEvaluatedTime:
                    type: string
                    format: date-time
                    description: The last time the scorecard's status was evaluated or updated by the controller.
              x-kubernetes-preserve-unknown-fields: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Component Types
          type: string
          jsonPath: .spec.componentTypeIds
          description: Component types the scorecard applies to
        - name: Name
          type: string
          jsonPath: .spec.name
          description: Human-readable name of the Scorecard
        - name: Status
          type: string
          jsonPath: .status.conditions[?(@.type=="Ready")].status
          description: The Ready status condition
        - name: Last-Evaluated
          type: date
          jsonPath: .status.lastEvaluatedTime
          description: Last time the scorecard status was evaluated
        - name: Metrics
          type: string
          jsonPath: .spec.criteria[*].hasMetricValue.metricName
          description: List of metric names used in criteria

  scope: Cluster
  names:
    plural: scorecards
    singular: scorecard
    kind: Scorecard
    shortNames:
    - sc