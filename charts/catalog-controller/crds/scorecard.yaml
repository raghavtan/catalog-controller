apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: scorecards.catalog.onefootball.com
spec:
  group: catalog.onefootball.com
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - componentTypeIds
                - criteria
                - name
                - scoringStrategyType
              properties:
                componentTypeIds:
                  type: array
                  items:
                    type: string
                  description: List of component types this scorecard applies to.
                criteria:
                  type: array
                  items:
                    type: object
                    properties:
                      hasMetricValue:
                        type: object
                        required:
                          - comparator
                          - comparatorValue
                          - metricName
                          - name
                          - weight
                        properties:
                          comparator:
                            type: string
                            enum: ["EQUALS", "LESS_THAN", "GREATER_THAN", "NOT_EQUALS"]
                            description: The comparison operator.
                          comparatorValue:
                            x-kubernetes-int-or-string: true
                            description: The value to compare the metric against.
                          metricName:
                            type: string
                            description: The internal name/key of the metric.
                          name:
                            type: string
                            description: The display name of the criterion.
                          weight:
                            type: integer
                            format: int32
                            description: The weight of this criterion in the scoring.
                description:
                  type: string
                  description: A URL or text describing the scorecard.
                importance:
                  type: string
                  enum: ["REQUIRED", "RECOMMENDED", "OPTIONAL"]
                  description: The importance level of the scorecard.
                  default: REQUIRED
                name:
                  type: string
                  description: The human-readable name of the scorecard.
                ownerId:
                  type: string
                  description: The identifier of the owner/team responsible for this scorecard.
                scoringStrategyType:
                  type: string
                  enum: ["WEIGHT_BASED", "POINT_BASED"]
                  description: The strategy used for calculating the score.
                  default: WEIGHT_BASED
                state:
                  type: string
                  enum: ["DRAFT", "PUBLISHED", "ARCHIVED"]
                  description: The lifecycle state of the scorecard.
                  default: DRAFT
            status:
              type: object
              properties:
                id:
                  type: string
                  nullable: true
                  description: The unique identifier assigned to the scorecard (e.g., by an external system).
                metricsSummary:
                  type: string
                  description: A summary of the metrics used in the scorecard.
                  nullable: true
                  default: ""
                metricAssociation:
                  type: array
                  description: Association between metric names and their unique identifiers.
                  items:
                    type: object
                    required:
                      - metricName
                      - metricId
                    properties:
                      metricName:
                        type: string
                        description: The internal name/key of the metric.
                      metricId:
                        type: string
                        description: The unique identifier for the metric.

      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Component Types
          type: string
          jsonPath: .spec.componentTypeIds
          description: Component types the scorecard applies to
        - name: ID
          type: string
          description: Unique identifier assigned by the controller upon processing
          jsonPath: .status.id
        - name: Metrics
          type: string
          jsonPath: .status.metricsSummary
          description: List of metric names used in criteria

  scope: Cluster
  names:
    plural: scorecards
    singular: scorecard
    kind: Scorecard
    shortNames:
    - sc