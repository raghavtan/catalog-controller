apiVersion: v1
kind: Service
metadata:
  name: {{ include "catalog-controller.fullname" . }}
  labels:
    {{- include "catalog-controller.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "catalog-controller.selectorLabels" . | nindent 4 }}