apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: components.catalog.onefootball.com
spec:
  group: catalog.onefootball.com
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - componentType
                - name
                - typeId
              properties:
                componentType:
                  type: string
                  description: The high-level type of the component (e.g., service, library).
                name:
                  type: string
                  description: The human-readable name of the component.
                slug:
                  type: string
                  description: A URL-friendly slug for the component.
                description:
                  type: string
                  description: A detailed description of the component.
                configVersion:
                  type: integer
                  format: int32
                  description: Version number for the component's configuration.
                typeId:
                  type: string
                  # Assuming specific values, add more if needed
                  enum: ["SERVICE", "LIBRARY", "WEBSITE", "APPLICATION", "TEMPLATE", "RUNTIME"]
                  description: A more specific identifier for the component type.
                dependsOn:
                  type: array
                  items:
                    type: string
                  description: List of other component names this component depends on.
                fields:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                  description: Custom key-value fields associated with the component.
                links:
                  type: array
                  items:
                    type: object
                    required:
                      - name
                      - type
                      - url
                    properties:
                      id:
                        type: string
                        description: Optional identifier for the link.
                      name:
                        type: string
                        description: Display name for the link.
                      type:
                        type: string
                        enum: ["REPOSITORY", "DASHBOARD", "ON_CALL", "CHAT_CHANNEL", "PROJECT", "DOCUMENTATION", "API_DOCUMENTATION"]
                        description: The type of the link.
                      url:
                        type: string
                        format: uri
                        description: The URL the link points to.
                  description: A list of relevant links for the component.
                documents:
                  type: array
                  items:
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
                  description: Associated documents or documentation references.
                labels:
                  type: array
                  items:
                    type: string
                  description: Tags or labels for categorizing the component.
                tribe:
                  type: string
                  description: The tribe or larger organizational unit the component belongs to.
                squad:
                  type: string
                  description: The squad or team directly responsible for the component.
            status:
              type: object
              properties:
                id:
                  type: string
                  description: The unique identifier assigned to the component (e.g., by an external system like Compass).
                ownerId:
                  type: string
                  description: The identifier of the owning team or entity.
                metricSources:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                  additionalProperties:
                    type: object
                    required:
                      - id
                      - name
                      - metric
                    properties:
                      id:
                        type: string
                        description: The unique identifier of the metric source.
                      name:
                        type: string
                        description: The name of the metric source.
                      metric:
                        type: string
                        description: The identifier of the associated metric definition.
                      facts:
                        type: array
                        items:
                          type: object
                          x-kubernetes-preserve-unknown-fields: true
                        description: Additional facts or data related to the metric source.
                  description: Status for each metric source associated with the component, keyed by metric name.
                conditions:
                  type: array
                  items:
                    type: object
                    required:
                      - type
                      - status
                      - lastTransitionTime
                      - reason
                      - message
                    properties:
                      type:
                        type: string
                        description: Type of condition (e.g., Ready, Synced).
                      status:
                        type: string
                        enum: ["True", "False", "Unknown"]
                        description: Status of the condition.
                      lastTransitionTime:
                        type: string
                        format: date-time
                        description: Last time the condition transitioned from one status to another.
                      reason:
                        type: string
                        description: A unique, one-word, CamelCase reason for the condition's last transition.
                      message:
                        type: string
                        description: A human-readable message indicating details about the last transition.
                  description: Represents the latest available observations of the component's state.
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Type
          type: string
          jsonPath: .spec.componentType
          description: High-level type of the Component
        - name: Name
          type: string
          jsonPath: .spec.name
          description: Human-readable name of the Component
        - name: Status
          type: string
          jsonPath: .status.conditions[?(@.type=="Ready")].status
          description: The Ready status condition
  scope: Namespaced
  names:
    plural: components
    singular: component
    kind: Component
    shortNames:
    - comp