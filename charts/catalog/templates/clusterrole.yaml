{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "catalog-controller.fullname" . }}
  labels:
    {{- include "catalog-controller.labels" . | nindent 4 }}
rules:
- apiGroups: ["catalog.onefootball.com"]
  resources: ["metrics", "scorecards", "components"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: [""]
  resources: ["events"]
  verbs: ["create", "patch"]
- apiGroups: ["apiextensions.k8s.io"]
  resources: ["customresourcedefinitions"]
  verbs: ["get", "list", "watch"]
{{- end }}