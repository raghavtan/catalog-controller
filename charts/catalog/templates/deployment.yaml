apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "catalog-controller.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "catalog-controller.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "catalog-controller.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "catalog-controller.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "catalog-controller.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
      - name: controller
        {{- with .Values.securityContext }}
        securityContext:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        env:
        - name: COMPASS_API_BASE_URL
          value: {{ .Values.compass.apiBaseUrl | quote }}
        - name: COMPASS_CLOUD_ID
          valueFrom:
            secretKeyRef:
              name: {{ include "catalog-controller.secretName" . }}
              key: cloud-id
        - name: COMPASS_API_TOKEN
          valueFrom:
            secretKeyRef:
              name: {{ include "catalog-controller.secretName" . }}
              key: api-token
        resources:
          {{- toYaml .Values.resources | nindent 10 }}